server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/tradingdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false
  sql:
    init:
      mode: always

jwt:
  secret: ${JWT_SECRET:change-me-super-secret-change-me-super-secret}
  access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
  refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:7}

logging:
  level:
    org.springframework.security: INFO
