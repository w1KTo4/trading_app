server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tradingdb}
    username: ${SPRING_DATASOURCE_USERNAME:trading}
    password: ${SPRING_DATASOURCE_PASSWORD:trading}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  sql:
    init:
      mode: always

jwt:
  secret: ${JWT_SECRET:change-me-super-secret-change-me-super-secret}
  access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
  refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:7}

logging:
  level:
    org.springframework.security: INFO
